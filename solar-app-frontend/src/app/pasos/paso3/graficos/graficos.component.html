<div class="container-graficos">
  <!-- Energía consumida y generada (barras apiladas) -->
  <div class="item-grafico">
    <div class="grafico-container-borde">
      <div class="head">
        <div class="icono">
          <img
            src="assets/icon-pot-intal.png"
            class="tamaño-icon"
            alt="Icono energía"
          />
        </div>
        <div class="titulo">
          <p>Energía consumida y generada</p>
        </div>
        <div class="resultado-container">
          <div class="unidad">
            <p class="unidad-texto"></p>
          </div>
        </div>
      </div>
      <div class="informacion-general">
        <div class="grafico-component">
          <div id="chartSolLunaRef"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Distribución energética (donut) -->
  <div class="item-grafico">
    <div class="grafico-container-borde">
      <div class="head">
        <div class="icono">
          <img
            src="assets/icon-pot-intal.png"
            class="tamaño-icon"
            alt="Icono distribución"
          />
        </div>
        <div class="titulo">
          <p>Distribución de energía anual</p>
        </div>
        <div class="resultado-container">
          <div class="unidad">
            <p class="unidad-texto"></p>
          </div>
        </div>
      </div>
      <div class="informacion-general">
        <div class="grafico-component">
          <div id="chartDonutEnergiaRef"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Ahorros anuales y flujo de caja acumulado -->
  <div class="item-grafico">
    <div class="grafico-container-borde">
      <div class="head">
        <div class="icono">
          <img src="assets/icon-dinero.png" class="tamaño-icon" alt="ahorros" />
        </div>
        <div class="titulo">
          <p>Ahorros anuales y flujo de caja acumulado</p>
        </div>
        <div class="resultado-container">
          <div class="resultado">
            <p class="resultado-numero"></p>
          </div>
          <div class="unidad">
            <p class="unidad-texto"></p>
          </div>
        </div>
      </div>
      <div class="informacion-general">
        <div class="grafico-component">
          <div id="chartAhorroRecuperoRef"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Emisiones CO2 evitadas acumuladas -->
  <div class="item-grafico">
    <div class="grafico-container-borde">
      <div class="head">
        <div class="icono">
          <img
            src="assets/icon-CO2.png"
            class="tamaño-icon"
            alt="Icono de Emisiones CO2"
          />
        </div>
        <div class="titulo">
          <p>Emisiones de CO<sub class="small-sup">2</sub> evitadas</p>
        </div>
        <div class="resultado-container">
          <div class="resultado">
            <p class="resultado-numero"></p>
          </div>
          <div class="unidad">
            <p class="unidad-texto"></p>
          </div>
        </div>
      </div>
      <div class="informacion-general">
        <div class="selector-vista">
          <button (click)="cambiarVistaCO2('anual')" [class.active]="vistaCO2 === 'anual'">Anual</button>
          <button (click)="cambiarVistaCO2('comparativa')" [class.active]="vistaCO2 === 'comparativa'">Comparativa</button>
          <button (click)="cambiarVistaCO2('acumulada')" [class.active]="vistaCO2 === 'acumulada'">Acumulada</button>
          <button (click)="cambiarVistaCO2('gauge')" [class.active]="vistaCO2 === 'gauge'">Velocímetro</button>
        </div>
        <div class="subtitulo-arboles" *ngIf="vistaCO2 !== 'gauge' && textoArboles" [innerHTML]="textoArboles">
        </div>
        <div class="grafico-component">
          <div id="emisionesChartRef"></div>
        </div>
      </div>
    </div>
  </div>

</div>
