<div class="resultados-paso3">
  <div class="component-container-borde">
    <div class="titulo-general">
      <p>Energía generada anual</p>
    </div>

    <div class="informacion-general">      
      <div class="datos">

        <div class="icono">
          <img
            src="assets/icon-sol.png"
            class="tamaño-icon"
            alt="Icono de energia"
          />
        </div>
  
        <div class="resultado-centro">
          <p class="resultado">  {{ currentYearlyEnergy | number : "1.0-0" }} </p>
          <p class="unidad">kWh-año</p>
        </div>

      </div>
    </div>

    <!-- Badge de Estructura de Montaje -->
    <div class="estructura-badge-card" [ngClass]="tipoEstructura">
      <mat-icon class="badge-icon">{{ tipoEstructura === 'optimo' ? 'wb_sunny' : 'grid_on' }}</mat-icon>
      <span>{{ tipoEstructura === 'optimo' ? 'Ángulo Óptimo (30°)' : 'Estructura Coplanar' }}</span>
    </div>

  </div>
</div>
